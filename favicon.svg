<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- 小サイズでも「ロック」と分かるよう、16px前提で太め＆要素少なめ -->
  <rect width="16" height="16" rx="4" fill="#e0e5ec"/>

  <!-- Shackle -->
  <path
    d="M5 7V5.2C5 3.1 6.7 1.4 8.8 1.4S12.6 3.1 12.6 5.2V7"
    fill="none"
    stroke="#2d3748"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Lock body -->
  <rect x="4" y="7" width="8" height="8" rx="2.5" fill="#2d3748"/>

  <!-- Keyhole (くり抜き: 背景色で上書き) -->
  <circle cx="8" cy="10" r="1.4" fill="#e0e5ec"/>
  <rect x="7.2" y="10.5" width="1.6" height="2.2" rx="0.8" fill="#e0e5ec"/>
</svg>
